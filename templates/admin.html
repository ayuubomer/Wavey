{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Admin Panel</h2>
    <!-- <input type="password" id="adminToken" placeholder="Enter Admin Token"> -->
    <button onclick="loadFiles()">Vis Filer</button>
</div>

<div class="card">
    <h3>Tilgjengelige dokumenter</h3>
    <ul id="fileList"></ul>
</div>

<div class="card">
    <h3>Legge til dokument</h3>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Legg til</button>
</div>

<script>
async function loadFiles() {
    //const token = document.getElementById("adminToken").value;

    const response = await fetch("/admin/files", {
        // headers: {
        //     "X-ADMIN-TOKEN": token
        // }
    });

    const data = await response.json();

    const list = document.getElementById("fileList");
    list.innerHTML = "";

    if (data.files) {
        data.files.forEach(file => {
            const li = document.createElement("li");
            li.innerText = file.display_name + " (" + file.state + ")";
            list.appendChild(li);
        });
    } else {
        list.innerText = data.error;
    }
}

async function uploadFile() {
    const token = document.getElementById("adminToken").value;
    const fileInput = document.getElementById("fileInput");

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    const response = await fetch("/admin/upload", {
        method: "POST",
        headers: {
            "X-ADMIN-TOKEN": token
        },
        body: formData
    });

    const data = await response.json();
    alert(data.message || data.error);
}
</script>

{% endblock %}
