<div class="chat-container">
    <div id="chatMessages"></div>

    <form id="queryForm" class="chat-input">
        <textarea name="query" id="queryInput" placeholder="Skriv..."></textarea>
        <button type="submit">Send</button>
    </form>
</div>

<style> 
    body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#fff;
}

.chat-container{
    display:flex;
    flex-direction:column;
    /* background-color: red; */
    height: 80vh;
}

/* messages area */
#chatMessages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* chat bubbles */
.message{
    max-width:70%;
    padding:12px 16px;
    border-radius:16px;
    line-height:1.4;
}

.user{
    align-self:flex-end;
    background: #00859b;
    color:white;
}

.bot{
    align-self:flex-start;
    background:#e4e6eb;
}

/* input area */
.chat-input{
    display:flex;
    gap:10px;
    padding:15px 0;
    border-top:1px solid #ddd;
    /* background:white; */
    justify-self: end;
}

.chat-input textarea{
    flex:1;
    resize:none;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.chat-input button{
    padding:10px 18px;
    border:none;
    background:#00859b;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
</style>

<script>
document.getElementById("queryForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const text = input.value.trim();
    if(!text) return;

    addMessage(text, "user");

    const formData = new FormData(this);
    console.log("Sending query:", formData.get("query"));
    input.value = "";


    const response = await fetch("/query", {
        method: "POST",
        body: formData,
        // headers: {
        //     "Content-Type": "application/json"
        // }
    });

    const data = await response.json();

    // document.getElementById("responseBox").innerText =
    //     data.response || data.error;
    addMessage(data.response || data.error, "bot");
});

const form = document.getElementById("queryForm");
const input = document.getElementById("queryInput");
const chat = document.getElementById("chatMessages");

// form.addEventListener("submit", function(e){

//     addMessage(text, "user");
//     input.value = "";

//     // simulate bot response
//     setTimeout(()=>{
//         addMessage("Bot response example...", "bot");
//     },500);
// });

function addMessage(text, type){
    const msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerText = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}
</script>

{% endblock %}
