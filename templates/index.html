{% extends "base.html" %}

{% block content %}

<div class="chat-container">

    <!-- FEED (your JS still targets this) -->
    <div id="chatMessages">

        <!-- WELCOME SCREEN (STATIC UI LIKE TSX showWelcome=true) -->
        <div class="welcome">

            <h1 class="logo">Wavey</h1>

            <h2 class="title">Hva kan jeg hjelpe deg med?</h2>

            <p class="subtitle">
                Jeg kan svare på spørsmål om netthandel, gi råd om optimalisering,
                og hjelpe deg med å vokse bedriften din.
            </p>

            <!-- TOPICS -->
            <div class="topics">

                <div class="topic-card">Ambassadører</div>
                <div class="topic-card">Eksport</div>
                <div class="topic-card">Vekst</div>
                <div class="topic-card">Skalering</div>

            </div>

            <!-- QUICK OPTIONS -->
            <div class="chips">

                <div class="chip">spørsmål 1</div>
                <div class="chip">spørsmål 2</div>
                <div class="chip">spørsmål 3</div>
                <div class="chip">spørsmål 4</div>

            </div>

        </div>

    </div>

    <!-- INPUT (UNCHANGED JS TARGETS) -->
    <form id="queryForm" class="chat-input">
        <textarea name="query" id="queryInput" placeholder="Skriv her ..."></textarea>
        <button type="submit">Send</button>
    </form>

</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600;700&display=swap');

:root {
    --brand: #00859b;
    --brand-dark: #006f82;
    --ink: #111827;
    --ink-3: #6b7280;
    --rule: #e5e7eb;
    --surface: #ffffff;
    --bg: #f9fafb;
    --font: 'Lato', sans-serif;
}

/* BODY */
body {
    margin: 0;
    font-family: var(--font);
    background: #fff;
}

/* CONTAINER */
.chat-container {
    display: flex;
    flex-direction: column;
    height: 80vh;
    max-width: 100%;
    margin: 30px auto;
    border: 1px solid var(--rule);
    border-radius: 16px;
    overflow: hidden;
}

/* FEED */
#chatMessages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* MESSAGE (USED BY YOUR JS) */
.message {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.4;
    white-space: pre-wrap;
}

.user {
    align-self: flex-end;
    background: var(--brand);
    color: white;
}

.bot {
    align-self: flex-start;
    background: #e4e6eb;
    color: #111;
}

/* WELCOME UI (NEW TSX STRUCTURE) */
.welcome {
    text-align: center;
    padding: 40px 20px;
}

.logo {
    font-size: 64px;
    color: var(--brand);
    margin-bottom: 10px;
}

.title {
    font-size: 28px;
    margin-bottom: 10px;
}

.subtitle {
    max-width: 520px;
    margin: 0 auto 20px;
    color: var(--ink-3);
}

/* TOPICS GRID */
.topics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}

.topic-card {
    padding: 14px;
    border: 1px solid var(--rule);
    border-radius: 12px;
    background: #fff;
}

/* CHIPS */
.chips {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.chip {
    padding: 10px;
    border-radius: 999px;
    border: 1px solid var(--rule);
    font-size: 12px;
}

/* INPUT */
.chat-input {
    display: flex;
    gap: 10px;
    padding: 14px;
    border-top: 1px solid var(--rule);
}

.chat-input textarea {
    flex: 1;
    resize: none;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #ccc;
}

.chat-input button {
    padding: 10px 16px;
    border: none;
    background: var(--brand);
    color: white;
    border-radius: 10px;
    cursor: pointer;
}
</style>

<script>
/* YOUR JS UNTOUCHED */
const form = document.getElementById("queryForm");
const input = document.getElementById("queryInput");
const chat = document.getElementById("chatMessages");

function addMessage(text, type){
    const msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerText = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function localBotResponse(text){
    const t = text.toLowerCase();

    if (t.includes("ambassadør")) return "Ambassadørprogrammet hjelper med nettverk og vekst.";
    if (t.includes("eksport")) return "Vi tilbyr støtte for eksport og markedsanalyse.";
    if (t.includes("vekst")) return "Vi hjelper deg med vekst og skalering.";
    if (t.includes("hei") || t.includes("hello")) return "Hei! Hva kan jeg hjelpe deg med?";

    return "Takk! Jeg kan hjelpe deg med vekst, eksport og skalering.";
}

form.addEventListener("submit", async function(e){
    e.preventDefault();

    const text = input.value.trim();
    if(!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
        const formData = new FormData();
        formData.append("query", text);

        const response = await fetch("/query", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        addMessage(data.response || data.error || localBotResponse(text), "bot");

    } catch (err) {
        addMessage(localBotResponse(text), "bot");
    }
});
</script>

{% endblock %}
